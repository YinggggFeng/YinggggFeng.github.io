version: "3"

services:
  jekyll:
    image: amirpourmand/al-folio
    container_name: al-folio-website
    command: >
      bash -lc "
        rm -f Gemfile.lock &&
        bundle config set path 'vendor/bundle' &&
        bundle install &&
        bundle exec jekyll serve --watch --port=8080 --host=0.0.0.0 --livereload --verbose --trace
      "
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll